<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Callback - Spotify</title>
</head>
<body>
  <h1>Przetwarzanie tokenu...</h1>

  <script>
    function getAccessTokenFromUrl() {
      // Adres jest np. callback.html#access_token=xxx&token_type=Bearer&expires_in=3600
      const hash = window.location.hash; 
      if (hash) {
        const params = new URLSearchParams(hash.substring(1)); 
        // usuwamy '#' i parsujemy klucze
        return {
          accessToken: params.get('access_token'),
          tokenType: params.get('token_type'),
          expiresIn: params.get('expires_in')
        };
      }
      return null;
    }

    const tokenObj = getAccessTokenFromUrl();
    if (tokenObj && tokenObj.accessToken) {
      // Zapisz token gdzieś (localStorage, sessionStorage, itp.)
      localStorage.setItem("spotify_token", tokenObj.accessToken);

      // Możesz też zapisać expiresIn itp. i odliczać, kiedy wygasa.

      // Przekieruj dalej, np. do "co_sie_teraz_slucha.html"
      window.location = "co_sie_teraz_slucha.html";
    } else {
      console.error("Brak tokenu w URL, logowanie nieudane?");
    }
  </script>
</body>
</html>
