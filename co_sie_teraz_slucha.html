<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Co się Teraz Słucha?</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="menu-container"></div>
  <h1>Co się Teraz Słucha?</h1>

  <p><button id="logoutBtn">Wyloguj</button></p>

  <div id="tracks-container">Ładowanie playlisty Top 50...</div>

  <div id="footer-container"></div>

  <script src="js/script.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/footer.js"></script>

  <script>
    // 1) Sprawdź token
    const token = localStorage.getItem("spotify_token");
    console.log(">>> [DEBUG] Wczytany token:", token);

    if (!token) {
      console.log(">>> [DEBUG] Brak tokena. Przekierowanie do logowania...");
      window.location = "spotify_login.html";
    }

    // Obsługa wylogowania (kasujemy token w localStorage)
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('spotify_token');
      console.log(">>> [DEBUG] Wylogowano. Przekierowanie do spotify_login.html");
      window.location = "spotify_login.html";
    });

    // 2) Funkcja do pobrania playlisty
    async function fetchTop50Poland() {
      // Sprawdź aktualne ID playlisty
      // Przykładowe ID: "37i9dQZEVXbMDoHDwVN2tF" (Top 50 Polska – ale sprawdź w Spotify)
      // "3cEYpjA9oz9GiPac4AsH4n" to tylko przykład z dokumentacji. Lepiej użyć prawdziwego ID, 
      // np. wziętego z linku "Udostępnij -> Kopiuj link do playlisty".
      const playlistId = "3cEYpjA9oz9GiPac4AsH4n";
      const endpoint = `https://api.spotify.com/v1/playlists/${playlistId}`;

      console.log(">>> [DEBUG] fetchTop50Poland() - endpoint:", endpoint);

      const resp = await fetch(endpoint, {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      if (!resp.ok) {
        console.log(">>> [DEBUG] Otrzymano status:", resp.status);
        if (resp.status === 401) {
          // Token wygasł lub jest nieprawidłowy -> wyloguj
          localStorage.removeItem('spotify_token');
          window.location = "spotify_login.html";
        }
        throw new Error(`Błąd Spotify API: ${resp.status}`);
      }

      // Zwracamy całą zawartość playlisty
      const data = await resp.json();
      console.log(">>> [DEBUG] Odpowiedź Spotify - surowe data:", data);
      return data;
    }

    // 3) Wyświetlamy playlistę w #tracks-container
    async function showTop50() {
      try {
        const data = await fetchTop50Poland();

        // data to obiekt playlisty
        // Utwory znajdują się w data.tracks.items
        const items = data.tracks ? data.tracks.items : [];
        console.log(">>> [DEBUG] items:", items);

        const container = document.getElementById("tracks-container");
        container.innerHTML = ""; // czyścimy placeholder

        items.forEach(item => {
          const track = item.track;
          // Zdarza się, że item może być null
          if (!track) return;

          const div = document.createElement("div");
          div.classList.add("track-item");
          div.innerHTML = `
            <p><strong>${track.name}</strong> - ${track.artists.map(a => a.name).join(", ")}</p>
            <p>Album: ${track.album.name}</p>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error("Błąd pobierania playlisty:", err);
      }
    }

    showTop50();
  </script>
</body>
</html>
