<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Co się Teraz Słucha?</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="menu-container"></div>
  <h1>Co się Teraz Słucha?</h1>

  <p><button id="logoutBtn">Wyloguj</button></p>

  <div id="tracks-container">Ładowanie playlisty Top 50...</div>

  <div id="footer-container"></div>

  <script src="js/script.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/footer.js"></script>

  <script>
    const token = localStorage.getItem("spotify_token");
    console.log(">>> [DEBUG] token =", token);

    if (!token) {
      console.log(">>> [DEBUG] Brak tokena, wracam do ekranu logowania...");
      window.location = "spotify_login.html";
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('spotify_token');
      console.log(">>> [DEBUG] Wylogowanie – usunięto token z localStorage.");
      window.location = "spotify_login.html";
    });

    async function fetchTop50Poland() {
      // Wstaw poprawne ID playlisty
      // Np. "37i9dQZEVXbMDoHDwVN2tF" (Poland Top 50)
      const playlistId = "37i9dQZEVXbMDoHDwVN2tF";
      const endpoint = `https://api.spotify.com/v1/playlists/${playlistId}`;

      console.log(">>> [DEBUG] fetchTop50Poland – endpoint:", endpoint);

      const resp = await fetch(endpoint, {
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      console.log(">>> [DEBUG] Odpowiedź status:", resp.status);

      if (!resp.ok) {
        if (resp.status === 401) {
          // Token niepoprawny lub wygasł – wyloguj
          localStorage.removeItem('spotify_token');
          console.log(">>> [DEBUG] Token niepoprawny lub wygasł. Redirect -> spotify_login.html");
          window.location = "spotify_login.html";
        }
        throw new Error(`Błąd Spotify API: ${resp.status}`);
      }

      const data = await resp.json();
      console.log(">>> [DEBUG] Zwrotka z API:", data);

      return data; // tutaj powinniśmy mieć obiekt, w którym jest 'tracks'
    }

    async function showTop50() {
      try {
        const data = await fetchTop50Poland();
        const container = document.getElementById("tracks-container");
        container.innerHTML = "";

        // Bezpieczne pobranie tablicy – jeśli czegoś brak, to i tak dostaniesz pustą
        const items = data?.tracks?.items ?? [];

        console.log(">>> [DEBUG] Liczba utworów w playlistTr: ", items.length);

        items.forEach((item, i) => {
          // item.track zawiera szczegóły utworu
          const track = item.track;
          if (!track) return;

          const div = document.createElement("div");
          div.classList.add("track-item");
          div.innerHTML = `
            <h3>#${i + 1} ${track.name}</h3>
            <p>Artyści: ${track.artists.map(a => a.name).join(", ")}</p>
            <p>Album: ${track.album.name}</p>
          `;
          container.appendChild(div);
        });

      } catch (err) {
        console.error("Błąd pobierania playlisty:", err);
      }
    }

    showTop50();
  </script>
</body>
</html>
