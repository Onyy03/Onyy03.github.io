<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Co się Teraz Słucha? - Test Featured Playlists</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>Test - Lista Featured Playlists (PL)</h1>
  <button id="logoutBtn">Wyloguj</button>
  <pre id="output">Ładowanie danych...</pre>

  <script>
    // Pobierz token z localStorage
    const token = localStorage.getItem("spotify_token");
    console.log(">>> [DEBUG] Wczytany token:", token);
    if (!token) {
      console.log(">>> [DEBUG] Brak tokena – przekierowanie do logowania.");
      window.location = "spotify_login.html";
    }

    // Obsługa wylogowania
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("spotify_token");
      window.location = "spotify_login.html";
    });

    // Funkcja pobierająca Featured Playlists dla Polski
    async function checkFeaturedPlaylists() {
      // Używamy endpointu Featured Playlists z parametrem country=PL
      const endpoint = "https://api.spotify.com/v1/browse/featured-playlists?country=PL";
      console.log(">>> [DEBUG] Wywoływany endpoint:", endpoint);

      try {
        const resp = await fetch(endpoint, {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        console.log(">>> [DEBUG] Otrzymano status:", resp.status);

        if (!resp.ok) {
          throw new Error(`Błąd Spotify API: ${resp.status}`);
        }

        const data = await resp.json();
        console.log(">>> [DEBUG] Odpowiedź z API:", data);

        // Wyświetlamy sformatowany JSON w elemencie <pre>
        document.getElementById("output").textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        console.error(">>> [DEBUG] Błąd podczas fetcha:", error);
        document.getElementById("output").textContent = "Błąd: " + error.message;
      }
    }

    // Wywołujemy funkcję
    checkFeaturedPlaylists();
  </script>
</body>
</html>
