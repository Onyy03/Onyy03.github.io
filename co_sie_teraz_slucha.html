<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Co się Teraz Słucha?</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="menu-container"></div>
  <h1>Co się Teraz Słucha?</h1>

  <div id="tracks-container">Ładowanie listy utworów...</div>

  <div id="footer-container"></div>
  
  <!-- Najpierw globalny script.js/menu.js, jeśli potrzebne do nawigacji -->
  <script src="js/script.js"></script>
  <script src="js/menu.js"></script>
  <!-- Skrypt do obsługi stopki -->
  <script src="js/footer.js"></script>

  <!-- Nasz plik do Spotify API -->
  <script type="module">
    import { getTop50Poland } from "./js/spotifyAPI.js";

    async function showPlaylist() {
      try {
        const data = await getTop50Poland();
        // data.items -> tablica utworów

        const container = document.getElementById('tracks-container');
        container.innerHTML = ""; // Czyścimy loader

        data.items.forEach(item => {
          const track = item.track;
          if (!track) return; // Czasem może być null, w razie usuniętego utworu

          // Tworzymy element do wyświetlenia
          const trackDiv = document.createElement('div');
          trackDiv.classList.add('track-item');

          trackDiv.innerHTML = `
            <p><strong>${track.name}</strong> – ${track.artists.map(a => a.name).join(", ")}</p>
            <p>Album: ${track.album.name}</p>
          `;

          container.appendChild(trackDiv);
        });
      } catch (err) {
        console.error(err);
      }
    }

    showPlaylist();
  </script>
</body>
</html>
